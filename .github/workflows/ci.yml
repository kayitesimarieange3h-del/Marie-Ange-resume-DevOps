name: CICD

on:
    push
jobs:
    build:
       runs-on: ubuntu-latest
       steps:
         - name: Check out code
           uses: actions/checkout@v4
         - name: Build Image
           run:  |
              docker build -t ${{secrets.DOCKER_USERNAME}}/appfolio:${{github.run_number}} .
              docker build -t ${{secrets.DOCKER_USERNAME}}/appfolio .
         - name: Docker login to DockerHub
           uses: docker/login-action@v4
           with:
              username: ${{secrets.DOCKER_USERNAME}}
              password: ${{secrets.DOCKER_PASSWORD}}
              
         - name: Push Image to DockerHub
           run: |
              docker push ${{secrets.DOCKER_USERNAME}}/appfolio:${{github.run_number}}  
              docker push ${{secrets.DOCKER_USERNAME}}/appfolio   

    deploy:
       needs: build
       runs-on: ubuntu-latest
       steps:
          - name: SSh into Linux and run container
            uses: appleboy/ssh-action@v1
            with:
              host: ${{ secrets.HOST }}
              username: ${{ secrets.SSH_USERNAME }}
              key: ${{ secrets.PRIVATE_KEY }}
              script: |
                 docker rm -f appfolio || echo "Container not found, skipping removal."
                 docker run -d --name appfolio -p 8080:80 ${{secrets.DOCKER_USERNAME}}/appfolio 